<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#11151c" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Tranquil" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="icon" href="icon.png" />
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css" />
<title>Bloom — Tranquil</title>
<style>
  /* ---- Game-specific styles for Bloom ---- */
  #board {
    background: var(--panel);
    border-radius: 14px;
    padding: 8px;
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    grid-template-rows: repeat(9, 1fr);
    gap: 3px;
    touch-action: none;
    user-select: none;
  }
  .cell {
    border-radius: 7px;
    transition: background 220ms ease;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.14), inset 0 -2px 0 rgba(0,0,0,0.22);
  }
  .cell.terr {
    box-shadow: inset 0 0 0 2px rgba(255,255,255,0.22),
                inset 0 2px 0 rgba(255,255,255,0.16), inset 0 -2px 0 rgba(0,0,0,0.22);
  }
  #palette {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 12px;
    padding: 4px 2px;
  }
  .swatch {
    flex: 1 1 0;
    max-width: 56px;
    aspect-ratio: 1 / 1;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    padding: 0;
    box-shadow: inset 0 3px 0 rgba(255,255,255,0.18), inset 0 -3px 0 rgba(0,0,0,0.28), 0 2px 6px rgba(0,0,0,0.3);
    transition: transform 120ms ease, opacity 160ms ease;
  }
  .swatch:active { transform: translateY(2px) scale(0.96); }
  .swatch.current {
    opacity: 0.35;
    cursor: default;
    transform: scale(0.88);
  }
  .swatch.current::after {
    content: "";
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="topbar">
    <div class="brand">
      <a href="index.html" class="icon-btn" aria-label="Back to games">‹</a>
      <span class="title">Bloom</span>
    </div>
    <div class="bar-actions">
      <button class="icon-btn" aria-label="High scores" onclick="LB.open('bloom')">🏆</button>
      <button id="restart" class="icon-btn" aria-label="New game">↻</button>
      <button id="settings-btn" class="icon-btn" aria-label="Settings">⚙</button>
    </div>
  </header>

  <div class="scores">
    <div class="score-box">
      <div class="score-label">Moves</div>
      <div class="score-val" id="moves">0</div>
    </div>
    <div class="score-box best">
      <div class="score-label">Best</div>
      <div class="score-val" id="best">–</div>
    </div>
  </div>

  <div class="play-area"><div id="board"></div></div>
  <div id="palette"></div>
</div>

<div id="settings-overlay" class="modal-overlay">
  <div class="modal settings">
    <h2>Bloom</h2>
    <div class="setting-row">
      <span class="label">Sound</span>
      <button id="sound-toggle" class="toggle on">On</button>
    </div>
    <div class="how">
      <p class="how-title">How to play</p>
      <p class="body">Pick a colour to flood your territory (starting top-left). Absorb the whole board in as few moves as you can.</p>
    </div>
    <button id="settings-share" class="share">Share the game</button>
    <button id="settings-close" class="ghost-btn">Done</button>
    <div class="version-tag" id="app-version"></div>
  </div>
</div>

<div id="overlay" class="modal-overlay">
  <div class="modal">
    <h2>Filled!</h2>
    <div class="final" id="final-moves">0</div>
    <div class="final-sub" id="final-sub"></div>
    <button id="play-again">Play again</button>
  </div>
</div>

<script src="leaderboard.js?v=34"></script>
<script>
(function () {
  "use strict";

  const GRID = 9;
  const COLORS = ["#5dd6c0", "#f2b35e", "#7aa2f7", "#e06c9f", "#9ece6a", "#bb9af7"];
  const BEST_KEY = "tranquil_bloom_best_v2";

  let grid = [];            // GRID x GRID of color index
  let moves = 0;
  let par = 0;              // best-effort minimum for THIS board (Flood-It has no
                             // cheap exact solver at this size, so this is an
                             // estimate from two greedy heuristics, not a proof)
  let best = (function () {
    const v = localStorage.getItem(BEST_KEY);
    return v === null ? null : Number(v);
  })();
  let won = false;

  const boardEl = document.getElementById("board");
  const playArea = document.querySelector(".play-area");
  const paletteEl = document.getElementById("palette");
  const movesEl = document.getElementById("moves");
  const bestEl = document.getElementById("best");
  const overlay = document.getElementById("overlay");
  const settingsOverlay = document.getElementById("settings-overlay");
  const soundToggle = document.getElementById("sound-toggle");

  let cellEls = [];

  // ---- Shared sound (collection-wide mute key) ----
  let muted = localStorage.getItem("tranquil_muted") === "1";
  let actx = null;
  function audio() {
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { actx = null; }
    }
    if (actx && actx.state === "suspended") actx.resume();
  }
  function tone(f, d, t, g) {
    if (muted || !actx) return;
    const o = actx.createOscillator(), gn = actx.createGain();
    o.type = t || "sine";
    o.frequency.value = f;
    gn.gain.setValueAtTime(0.0001, actx.currentTime);
    gn.gain.exponentialRampToValueAtTime(g || 0.1, actx.currentTime + 0.01);
    gn.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + d);
    o.connect(gn); gn.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + d + 0.02);
  }
  function sfxMove() { tone(220, 0.08, "triangle", 0.08); }
  function sfxWin() {
    [523, 659, 784].forEach((f, i) => setTimeout(() => tone(f, 0.22, "sine", 0.12), i * 130));
  }

  // ---- Board build / render ----
  function buildBoard() {
    boardEl.innerHTML = "";
    cellEls = [];
    for (let r = 0; r < GRID; r++) {
      cellEls[r] = [];
      for (let c = 0; c < GRID; c++) {
        const d = document.createElement("div");
        d.className = "cell";
        boardEl.appendChild(d);
        cellEls[r][c] = d;
      }
    }
  }

  // Flood-connected region from (0,0) of the same colour.
  function territory() {
    const target = grid[0][0];
    const seen = Array.from({ length: GRID }, () => Array(GRID).fill(false));
    const stack = [[0, 0]];
    seen[0][0] = true;
    const cells = [];
    while (stack.length) {
      const [r, c] = stack.pop();
      cells.push([r, c]);
      const nb = [[r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]];
      for (const [nr, nc] of nb) {
        if (nr < 0 || nr >= GRID || nc < 0 || nc >= GRID) continue;
        if (seen[nr][nc] || grid[nr][nc] !== target) continue;
        seen[nr][nc] = true;
        stack.push([nr, nc]);
      }
    }
    return { cells, color: target, seen };
  }

  // ---- Par estimator: Flood-It has no cheap exact solver at 9x9/6 colours
  // (it's NP-hard in general), so this runs two greedy heuristics and takes
  // whichever does better, as a consistent (if not provably optimal) baseline
  // so different random boards are comparable on the leaderboard. ----
  function territoryOf(g) {
    const target = g[0][0];
    const seen = Array.from({ length: GRID }, () => Array(GRID).fill(false));
    const stack = [[0, 0]];
    seen[0][0] = true;
    const cells = [[0, 0]];
    while (stack.length) {
      const [r, c] = stack.pop();
      const nb = [[r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]];
      for (const [nr, nc] of nb) {
        if (nr < 0 || nr >= GRID || nc < 0 || nc >= GRID) continue;
        if (seen[nr][nc] || g[nr][nc] !== target) continue;
        seen[nr][nc] = true;
        stack.push([nr, nc]);
        cells.push([nr, nc]);
      }
    }
    return { cells, color: target };
  }
  function applyColorOf(g, cells, color) {
    const ng = g.map((row) => row.slice());
    for (const [r, c] of cells) ng[r][c] = color;
    return ng;
  }
  function isWonOf(g) {
    const first = g[0][0];
    for (let r = 0; r < GRID; r++) for (let c = 0; c < GRID; c++) if (g[r][c] !== first) return false;
    return true;
  }
  // 1-ply greedy: pick whichever colour leaves the largest territory.
  function greedyPar1(startGrid) {
    let g = startGrid, moves = 0;
    while (!isWonOf(g) && moves < 80) {
      const terr = territoryOf(g);
      let bestColor = -1, bestSize = -1;
      for (let c = 0; c < COLORS.length; c++) {
        if (c === terr.color) continue;
        const size = territoryOf(applyColorOf(g, terr.cells, c)).cells.length;
        if (size > bestSize) { bestSize = size; bestColor = c; }
      }
      g = applyColorOf(g, terr.cells, bestColor);
      moves++;
    }
    return moves;
  }
  // 2-ply greedy: look one extra move ahead before committing.
  function greedyPar2(startGrid) {
    let g = startGrid, moves = 0;
    while (!isWonOf(g) && moves < 80) {
      const terr = territoryOf(g);
      let bestColor = -1, bestScore = -1;
      for (let c1 = 0; c1 < COLORS.length; c1++) {
        if (c1 === terr.color) continue;
        const g1 = applyColorOf(g, terr.cells, c1);
        if (isWonOf(g1)) { bestColor = c1; bestScore = Infinity; break; }
        const terr1 = territoryOf(g1);
        let best2 = -1;
        for (let c2 = 0; c2 < COLORS.length; c2++) {
          if (c2 === terr1.color) continue;
          const size = territoryOf(applyColorOf(g1, terr1.cells, c2)).cells.length;
          if (size > best2) best2 = size;
        }
        if (best2 > bestScore) { bestScore = best2; bestColor = c1; }
      }
      g = applyColorOf(g, terr.cells, bestColor);
      moves++;
    }
    return moves;
  }
  function estimatePar(startGrid) {
    return Math.min(greedyPar1(startGrid), greedyPar2(startGrid));
  }

  function renderBoard() {
    const terr = territory();
    for (let r = 0; r < GRID; r++) {
      for (let c = 0; c < GRID; c++) {
        const el = cellEls[r][c];
        el.style.background = COLORS[grid[r][c]];
        el.classList.toggle("terr", terr.seen[r][c]);
      }
    }
  }

  function buildPalette() {
    paletteEl.innerHTML = "";
    COLORS.forEach((col, i) => {
      const b = document.createElement("button");
      b.className = "swatch";
      b.style.background = col;
      b.setAttribute("aria-label", "Colour " + (i + 1));
      b.addEventListener("pointerdown", () => { audio(); });
      b.addEventListener("click", () => pickColor(i));
      paletteEl.appendChild(b);
    });
    updatePalette();
  }

  function updatePalette() {
    const cur = grid[0][0];
    const btns = paletteEl.children;
    for (let i = 0; i < btns.length; i++) {
      btns[i].classList.toggle("current", i === cur);
    }
  }

  function isWon() {
    const first = grid[0][0];
    for (let r = 0; r < GRID; r++)
      for (let c = 0; c < GRID; c++)
        if (grid[r][c] !== first) return false;
    return true;
  }

  function pickColor(idx) {
    if (won) return;
    if (idx === grid[0][0]) return; // no-op on current colour

    // Recolour entire current territory, then flood-fill absorbs neighbours
    // of the new colour automatically on the next territory() computation.
    const terr = territory();
    for (const [r, c] of terr.cells) grid[r][c] = idx;

    moves += 1;
    movesEl.textContent = moves;
    sfxMove();

    renderBoard();
    updatePalette();

    if (isWon()) winGame();
  }

  function winGame() {
    won = true;
    const overPar = Math.max(0, moves - par);
    let newBest = false;
    if (best === null || overPar < best) {
      best = overPar;
      newBest = true;
      localStorage.setItem(BEST_KEY, String(best));
    }
    bestEl.textContent = best === 0 ? "Perfect" : "+" + best;
    document.getElementById("final-moves").textContent = moves;
    document.getElementById("final-sub").textContent = overPar === 0
      ? "Perfect solve — matched our best estimate!"
      : moves + " moves (~" + par + " was our best estimate)";
    setTimeout(sfxWin, 60);
    setTimeout(() => LB.finish({ game: 'bloom', value: overPar, resultTitle: 'Filled!', onPlayAgain: newGame }), 360);
  }

  function newGame() {
    won = false;
    moves = 0;
    grid = Array.from({ length: GRID }, () =>
      Array.from({ length: GRID }, () => Math.floor(Math.random() * COLORS.length)));
    par = estimatePar(grid);
    movesEl.textContent = "0";
    bestEl.textContent = (best === null ? "–" : (best === 0 ? "Perfect" : "+" + best));
    buildBoard();
    renderBoard();
    buildPalette();
    overlay.classList.remove("show");
    sizeBoard();
    requestAnimationFrame(sizeBoard);
    setTimeout(sizeBoard, 300);
  }

  // ---- Board auto-sizing (largest square that fits) ----
  function sizeBoard() {
    const r = playArea.getBoundingClientRect();
    const s = Math.max(0, Math.floor(Math.min(r.width, r.height)));
    boardEl.style.width = s + "px";
    boardEl.style.height = s + "px";
  }
  window.addEventListener("resize", sizeBoard);
  window.addEventListener("orientationchange", () => setTimeout(sizeBoard, 150));

  // ---- Settings / sound toggle ----
  function updateSoundToggle() {
    soundToggle.textContent = muted ? "Off" : "On";
    soundToggle.classList.toggle("on", !muted);
  }

  soundToggle.addEventListener("click", () => {
    muted = !muted;
    localStorage.setItem("tranquil_muted", muted ? "1" : "0");
    updateSoundToggle();
    if (!muted) { audio(); sfxMove(); }
  });
  document.getElementById("settings-btn").addEventListener("click", () => {
    updateSoundToggle();
    settingsOverlay.classList.add("show");
  });
  document.getElementById("settings-close").addEventListener("click", () => settingsOverlay.classList.remove("show"));
  settingsOverlay.addEventListener("click", (e) => {
    if (e.target === settingsOverlay) settingsOverlay.classList.remove("show");
  });

  async function shareGame() {
    const text = "Bloom — a calm flood-fill puzzle with no ads. Play it:";
    const url = "https://pete1552.github.io/AGTest/";
    try {
      if (navigator.share) { await navigator.share({ title: "Bloom", text, url }); return; }
    } catch (e) { return; }
    try {
      await navigator.clipboard.writeText(text + " " + url);
      const btn = document.getElementById("settings-share");
      const old = btn.textContent;
      btn.textContent = "Link copied!";
      setTimeout(() => { btn.textContent = old; }, 1500);
    } catch (e) {}
  }
  document.getElementById("settings-share").addEventListener("click", shareGame);

  document.getElementById("restart").addEventListener("click", newGame);
  document.getElementById("play-again").addEventListener("click", newGame);

  // ---- Boot ----
  updateSoundToggle();
  newGame();
  sizeBoard();
  requestAnimationFrame(sizeBoard);
  setTimeout(sizeBoard, 300);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(sizeBoard);
})();
</script>
</body>
</html>
