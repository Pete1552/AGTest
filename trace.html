<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#11151c" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Tranquil" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css" />
<title>Trace — Tranquil</title>
<style>
  /* Game-specific styles only */
  #board {
    position: relative;
    background: var(--panel);
    border-radius: 14px;
    padding: 8px;
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    grid-template-rows: repeat(6, 1fr);
    gap: 6px;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .cell {
    position: relative;
    background: var(--cell-empty);
    border-radius: var(--radius);
    transition: background 110ms ease, box-shadow 110ms ease;
  }
  .cell.on {
    background: var(--accent);
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.18), inset 0 -2px 0 rgba(0,0,0,0.22);
  }
  .cell.head {
    box-shadow: inset 0 0 0 3px rgba(255,255,255,0.55),
                inset 0 2px 0 rgba(255,255,255,0.18);
    filter: brightness(1.08);
  }
  /* Connector nubs joining consecutive path cells across the gap */
  .cell .link {
    position: absolute;
    background: var(--accent);
    z-index: 1;
  }
  .cell .link.right { top: 28%; bottom: 28%; right: -8px; width: 10px; border-radius: 3px; }
  .cell .link.left  { top: 28%; bottom: 28%; left: -8px; width: 10px; border-radius: 3px; }
  .cell .link.down  { left: 28%; right: 28%; bottom: -8px; height: 10px; border-radius: 3px; }
  .cell .link.up    { left: 28%; right: 28%; top: -8px; height: 10px; border-radius: 3px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="topbar">
    <div class="brand">
      <a href="index.html" class="icon-btn" aria-label="Back to games">‹</a>
      <span class="title">Trace</span>
    </div>
    <div class="bar-actions">
      <button id="restart" class="icon-btn" aria-label="New game">↻</button>
      <button id="settings-btn" class="icon-btn" aria-label="Settings">⚙</button>
    </div>
  </header>

  <div class="scores">
    <div class="score-box">
      <div class="score-label">Filled</div>
      <div class="score-val" id="filled">0/36</div>
    </div>
    <div class="score-box best">
      <div class="score-label">Best time</div>
      <div class="score-val" id="best">–</div>
    </div>
  </div>

  <div class="play-area"><div id="board"></div></div>
</div>

<div id="settings-overlay" class="modal-overlay">
  <div class="modal settings">
    <h2>Trace</h2>
    <div class="setting-row">
      <span class="label">Sound</span>
      <button id="sound-toggle" class="toggle on">On</button>
    </div>
    <div class="how">
      <p class="how-title">How to play</p>
      <p class="body">Drag to draw one continuous line that passes through every cell exactly once, moving up/down/left/right. Drag back to undo.</p>
    </div>
    <p class="promise">No ads. No pop-ups. No nags — ever.</p>
    <button id="settings-share" class="share">Share the game</button>
    <button id="settings-close" class="ghost-btn">Done</button>
  </div>
</div>

<div id="overlay" class="modal-overlay">
  <div class="modal">
    <h2>Solved!</h2>
    <div class="final" id="final-time">0s</div>
    <div class="final-sub" id="final-sub"></div>
    <button id="play-again">Play again</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  const GRID = 6;
  const TOTAL = GRID * GRID;

  // ---- State ----
  let path = [];                 // ordered array of [r, c]
  let inPath = [];               // GRID x GRID boolean: is cell currently in path
  let drawing = false;           // pointer is down and dragging
  let startTime = 0;             // ms timestamp of first cell added
  let timerId = null;
  let solved = false;
  let best = Number(localStorage.getItem("tranquil_trace_best") || 0) || 0;

  let muted = localStorage.getItem("tranquil_muted") === "1";

  // ---- Elements ----
  const playArea = document.querySelector(".play-area");
  const board = document.getElementById("board");
  const filledEl = document.getElementById("filled");
  const bestEl = document.getElementById("best");
  const overlay = document.getElementById("overlay");
  const settingsOverlay = document.getElementById("settings-overlay");
  const soundToggle = document.getElementById("sound-toggle");

  let cellEls = [];              // GRID x GRID of cell elements

  // ---- Sound (shared collection mute key) ----
  let actx = null;
  function audio() {
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { actx = null; }
    }
    if (actx && actx.state === "suspended") actx.resume();
  }
  function tone(f, d, t, g) {
    if (muted || !actx) return;
    const o = actx.createOscillator(), gn = actx.createGain();
    o.type = t || "sine";
    o.frequency.value = f;
    gn.gain.setValueAtTime(0.0001, actx.currentTime);
    gn.gain.exponentialRampToValueAtTime(g || 0.1, actx.currentTime + 0.01);
    gn.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + d);
    o.connect(gn); gn.connect(actx.destination);
    o.start();
    o.stop(actx.currentTime + d + 0.02);
  }
  function sfxSolve() {
    [523.25, 659.25, 783.99, 1046.5].forEach((f, i) =>
      setTimeout(() => tone(f, 0.4, "sine", 0.12), i * 110));
  }

  // ---- Build board ----
  function buildBoard() {
    board.innerHTML = "";
    cellEls = [];
    for (let r = 0; r < GRID; r++) {
      cellEls[r] = [];
      for (let c = 0; c < GRID; c++) {
        const d = document.createElement("div");
        d.className = "cell";
        d.dataset.r = r;
        d.dataset.c = c;
        board.appendChild(d);
        cellEls[r][c] = d;
      }
    }
  }

  // ---- Time formatting ----
  function fmt(sec) { return Math.max(0, Math.round(sec)) + "s"; }

  function updateFilled() {
    filledEl.textContent = path.length + "/" + TOTAL;
  }

  function updateBest() {
    bestEl.textContent = best > 0 ? fmt(best) : "–";
  }

  // ---- Timer ----
  function startTimer() {
    if (startTime) return;
    startTime = performance.now();
  }
  function elapsedSec() {
    return startTime ? (performance.now() - startTime) / 1000 : 0;
  }
  function stopTimer() {
    if (timerId) { clearInterval(timerId); timerId = null; }
  }

  // ---- Rendering the path ----
  function clearAllVisuals() {
    for (let r = 0; r < GRID; r++) {
      for (let c = 0; c < GRID; c++) {
        const el = cellEls[r][c];
        el.classList.remove("on", "head");
        // remove any link nubs
        const links = el.querySelectorAll(".link");
        for (const l of links) l.remove();
      }
    }
  }

  function renderPath() {
    clearAllVisuals();
    for (let i = 0; i < path.length; i++) {
      const [r, c] = path[i];
      const el = cellEls[r][c];
      el.classList.add("on");
      // draw a connector toward the next cell in the path
      if (i < path.length - 1) {
        const [nr, nc] = path[i + 1];
        const link = document.createElement("div");
        link.className = "link";
        if (nr === r && nc === c + 1) link.classList.add("right");
        else if (nr === r && nc === c - 1) link.classList.add("left");
        else if (nc === c && nr === r + 1) link.classList.add("down");
        else if (nc === c && nr === r - 1) link.classList.add("up");
        el.appendChild(link);
      }
    }
    if (path.length > 0) {
      const [hr, hc] = path[path.length - 1];
      cellEls[hr][hc].classList.add("head");
    }
    updateFilled();
  }

  // ---- Path logic ----
  function resetState() {
    path = [];
    inPath = Array.from({ length: GRID }, () => Array(GRID).fill(false));
    drawing = false;
    solved = false;
    startTime = 0;
    stopTimer();
  }

  function adjacent(a, b) {
    const dr = Math.abs(a[0] - b[0]);
    const dc = Math.abs(a[1] - b[1]);
    return (dr + dc) === 1;
  }

  // Try to extend/backtrack the path toward cell (r,c) based on a pointer entering it.
  function visitCell(r, c) {
    if (solved) return;
    if (r < 0 || r >= GRID || c < 0 || c >= GRID) return;

    // First cell of a fresh drag starts the path.
    if (path.length === 0) {
      path.push([r, c]);
      inPath[r][c] = true;
      startTimer();
      renderPath();
      tone(440, 0.05, "sine", 0.07);
      return;
    }

    const head = path[path.length - 1];
    if (r === head[0] && c === head[1]) return; // same cell, ignore

    // Backtrack: entering the second-to-last cell pops the last.
    if (path.length >= 2) {
      const prev = path[path.length - 2];
      if (prev[0] === r && prev[1] === c) {
        const popped = path.pop();
        inPath[popped[0]][popped[1]] = false;
        renderPath();
        tone(330, 0.05, "sine", 0.06);
        return;
      }
    }

    // Extend: must be orthogonally adjacent to head and not already in path.
    if (!inPath[r][c] && adjacent(head, [r, c])) {
      path.push([r, c]);
      inPath[r][c] = true;
      renderPath();
      tone(440, 0.05, "sine", 0.07);
      checkWin();
    }
    // Non-adjacent jumps are ignored.
  }

  function checkWin() {
    if (path.length === TOTAL && !solved) {
      solved = true;
      drawing = false;
      const t = elapsedSec();
      stopTimer();
      let improved = false;
      if (best === 0 || t < best) {
        best = t;
        localStorage.setItem("tranquil_trace_best", String(t));
        improved = true;
      }
      updateBest();
      sfxSolve();
      document.getElementById("final-time").textContent = fmt(t);
      document.getElementById("final-sub").textContent =
        improved ? "New best!" : (best > 0 ? "Best · " + fmt(best) : "");
      setTimeout(() => overlay.classList.add("show"), 350);
    }
  }

  // ---- Pointer → cell mapping (robust: elementFromPoint + data attrs) ----
  function cellFromPoint(x, y) {
    const el = document.elementFromPoint(x, y);
    if (!el) return null;
    const cell = el.closest(".cell");
    if (!cell || !board.contains(cell)) return null;
    return [Number(cell.dataset.r), Number(cell.dataset.c)];
  }

  function onPointerDown(e) {
    if (solved) return;
    audio();
    e.preventDefault();
    const cell = cellFromPoint(e.clientX, e.clientY);
    if (!cell) return;
    // Start a fresh path on each pointer-down.
    resetState();
    drawing = true;
    try { board.setPointerCapture(e.pointerId); } catch (err) {}
    visitCell(cell[0], cell[1]);
  }

  function onPointerMove(e) {
    if (!drawing || solved) return;
    e.preventDefault();
    const cell = cellFromPoint(e.clientX, e.clientY);
    if (!cell) return;
    visitCell(cell[0], cell[1]);
  }

  function onPointerUp(e) {
    drawing = false;
    try { board.releasePointerCapture(e.pointerId); } catch (err) {}
  }

  board.addEventListener("pointerdown", onPointerDown);
  board.addEventListener("pointermove", onPointerMove);
  board.addEventListener("pointerup", onPointerUp);
  board.addEventListener("pointercancel", onPointerUp);

  // ---- New game ----
  function newGame() {
    overlay.classList.remove("show");
    resetState();
    renderPath();      // clears visuals + updates filled count
    updateBest();
  }

  // ---- Board auto-sizing ----
  function sizeBoard() {
    const r = playArea.getBoundingClientRect();
    const s = Math.max(0, Math.floor(Math.min(r.width, r.height)));
    board.style.width = s + "px";
    board.style.height = s + "px";
  }
  window.addEventListener("resize", sizeBoard);
  window.addEventListener("orientationchange", () => setTimeout(sizeBoard, 150));

  // ---- Settings / sound ----
  function updateSoundToggle() {
    soundToggle.textContent = muted ? "Off" : "On";
    soundToggle.classList.toggle("on", !muted);
  }

  async function shareGame() {
    const text = "Trace — a calm one-line puzzle with no ads. Play it:";
    const url = "https://pete1552.github.io/AGTest/";
    try {
      if (navigator.share) { await navigator.share({ title: "Trace", text, url }); return; }
    } catch (e) { return; }
    try {
      await navigator.clipboard.writeText(text + " " + url);
      const btn = document.getElementById("settings-share");
      const old = btn.textContent;
      btn.textContent = "Link copied!";
      setTimeout(() => { btn.textContent = old; }, 1500);
    } catch (e) {}
  }

  soundToggle.addEventListener("click", () => {
    muted = !muted;
    localStorage.setItem("tranquil_muted", muted ? "1" : "0");
    updateSoundToggle();
    if (!muted) { audio(); tone(440, 0.05, "sine", 0.07); }
  });
  document.getElementById("settings-btn").addEventListener("click", () => {
    updateSoundToggle();
    settingsOverlay.classList.add("show");
  });
  document.getElementById("settings-close").addEventListener("click", () => settingsOverlay.classList.remove("show"));
  settingsOverlay.addEventListener("click", (e) => {
    if (e.target === settingsOverlay) settingsOverlay.classList.remove("show");
  });
  document.getElementById("settings-share").addEventListener("click", shareGame);
  document.getElementById("restart").addEventListener("click", newGame);
  document.getElementById("play-again").addEventListener("click", newGame);

  // ---- Boot ----
  buildBoard();
  updateSoundToggle();
  newGame();
  sizeBoard();
  requestAnimationFrame(sizeBoard);
  setTimeout(sizeBoard, 300);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(sizeBoard);
})();
</script>
</body>
</html>
