<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#11151c" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Tranquil" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="icon" href="icon.png" />
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css" />
<title>World Score — Tranquil</title>
<style>
  html, body { overflow-y: auto; }
  body { position: static; height: auto; min-height: 100%; }
  .wrap { height: auto; min-height: 100%; overflow: visible; padding-bottom: 30px; }

  .ws-sub { text-align: center; color: var(--muted); font-size: 12px; margin: 8px 0 0; line-height: 1.4; }

  .games-panel { background: var(--panel); border-radius: 16px; padding: 4px 12px; margin-top: 10px; }
  .game-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .game-row:last-child { border-bottom: none; }
  .g-icon {
    width: 38px; height: 38px; border-radius: 10px; flex: none;
    background: var(--grid); display: flex; align-items: center; justify-content: center; font-size: 20px;
  }
  .g-info { flex: 1; min-width: 0; }
  .g-name { font-weight: 700; font-family: var(--font-display); font-size: 15px; }
  .g-result { color: var(--muted); font-size: 12px; }
  .g-pts { font-family: var(--font-display); font-weight: 700; color: var(--accent); width: 58px; text-align: right; flex: none; font-size: 15px; }
  .g-pts.zero { color: var(--muted); opacity: 0.6; }

  .board-panel { background: var(--panel); border-radius: 16px; padding: 10px 12px; margin-top: 18px; }
  .board-title { color: var(--muted); font-size: 11px; letter-spacing: 0.4px; text-align: center; margin: 2px 0 8px; }
  .lb-games { color: var(--muted); font-size: 11px; font-weight: 600; margin-left: 6px; }
  .foot-note { text-align: center; color: var(--muted); font-size: 11px; opacity: 0.7; margin-top: 12px; }
  .toggle-details { display: block; margin: 10px auto 0; background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>
<div class="wrap">
  <header class="topbar">
    <div class="brand">
      <a href="index.html" class="icon-btn" aria-label="Back to games">‹</a>
      <span class="title">World Score</span>
    </div>
    <div class="bar-actions">
      <button id="refresh" class="icon-btn" aria-label="Refresh">↻</button>
    </div>
  </header>

  <p class="ws-sub">Your best-ever score in every game, converted to points on the same 0–100 scale and added together. Play more games — or beat your old bests — to climb.</p>

  <div class="scores">
    <div class="score-box best"><div class="score-label">Your world score</div><div class="score-val" id="pts">0</div></div>
    <div class="score-box"><div class="score-label">Games counted</div><div class="score-val" id="done">0/0</div></div>
  </div>

  <button class="toggle-details" id="toggle-details">Show per-game breakdown</button>
  <div class="games-panel" id="game-list" style="display:none;"></div>

  <div class="board-panel">
    <div class="board-title" id="board-title"></div>
    <div class="lb-list" id="board"><div class="lb-loading">Loading…</div></div>
  </div>

  <div class="foot-note">All-time totals across every game · updates as new high scores come in</div>
</div>

<script src="leaderboard.js?v=53"></script>
<script>
(function () {
  "use strict";

  function esc(s) {
    return String(s).replace(/[&<>"]/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]; });
  }

  var GAMES = LB.gameList().filter(function (g) { return typeof g.pts === "function"; });
  var scope = LB.isGlobal() ? "🌍 Global" : "On this device";
  var myName = localStorage.getItem("tranquil_name") || "";

  var listEl = document.getElementById("game-list");
  var boardEl = document.getElementById("board");

  // Fetch every game's all-time rows once, compute each name's best raw
  // score per game, and derive both "my" per-game breakdown and the full
  // cross-player totals board from that single pass.
  function load() {
    boardEl.innerHTML = '<div class="lb-loading">Loading…</div>';
    document.getElementById("board-title").textContent = scope + " · all-time";
    return Promise.all(GAMES.map(function (g) {
      return LB.allRows(g.id).then(function (rows) { return { game: g, rows: rows || [] }; })
        .catch(function () { return { game: g, rows: [] }; });
    })).then(function (results) {
      var totals = {};  // name -> { sum, games }
      var mine = {};    // gameId -> best raw score for myName

      results.forEach(function (r) {
        var best = {}; // name -> best raw score in this game
        r.rows.forEach(function (row) {
          var n = row.name || "—";
          var better = best[n] == null || (r.game.dir === "asc" ? row.score < best[n] : row.score > best[n]);
          if (better) best[n] = row.score;
        });
        Object.keys(best).forEach(function (n) {
          var p = r.game.pts(best[n]);
          var t = totals[n] || (totals[n] = { sum: 0, games: 0 });
          t.sum += p; t.games++;
        });
        if (myName && best[myName] != null) mine[r.game.id] = best[myName];
      });

      var board = Object.keys(totals).map(function (n) {
        return { name: n, score: totals[n].sum, games: totals[n].games };
      }).sort(function (a, b) { return b.score - a.score; });

      return { board: board, mine: mine };
    });
  }

  function renderMine(mine) {
    var pts = 0, done = 0, h = "";
    GAMES.forEach(function (g) {
      var val = mine[g.id];
      var played = val != null;
      if (played) { pts += g.pts(val); done++; }
      h += '<div class="game-row">' +
        '<div class="g-icon">' + g.icon + '</div>' +
        '<div class="g-info"><div class="g-name">' + esc(g.name) + '</div>' +
          '<div class="g-result">' + (played ? "Best: " + esc(g.fmt(val)) : "Not played yet") + '</div></div>' +
        '<div class="g-pts' + (played ? '' : ' zero') + '">' + (played ? g.pts(val) + ' pt' + (g.pts(val) === 1 ? '' : 's') : '—') + '</div>' +
      '</div>';
    });
    listEl.innerHTML = h;
    document.getElementById("pts").textContent = pts;
    document.getElementById("done").textContent = done + "/" + GAMES.length;
  }

  function rowsHtml(rows) {
    if (!rows.length) return '<div class="lb-empty">No scores yet — be the first!</div>';
    var h = "";
    rows.slice(0, 20).forEach(function (r, i) {
      h += '<div class="lb-row' + (r.name === myName ? ' me' : '') + '">' +
        '<span class="lb-rank">' + (i + 1) + '</span>' +
        '<span class="lb-name">' + esc(r.name) +
          '<span class="lb-games">· ' + r.games + ' game' + (r.games === 1 ? '' : 's') + '</span></span>' +
        '<span class="lb-score">' + r.score + ' pts</span></div>';
    });
    return h;
  }

  function renderAll() {
    load().then(function (res) {
      renderMine(res.mine);
      boardEl.innerHTML = rowsHtml(res.board);
    }).catch(function () {
      boardEl.innerHTML = '<div class="lb-empty">Couldn’t load the board.</div>';
    });
  }

  document.getElementById("toggle-details").addEventListener("click", function () {
    var open = listEl.style.display !== "none";
    listEl.style.display = open ? "none" : "";
    this.textContent = open ? "Show per-game breakdown" : "Hide per-game breakdown";
  });
  document.getElementById("refresh").addEventListener("click", renderAll);
  window.addEventListener("pageshow", renderAll);
  document.addEventListener("visibilitychange", function () { if (!document.hidden) renderAll(); });

  renderAll();
})();
</script>
</body>
</html>
