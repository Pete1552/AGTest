<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#11151c" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Tranquil" />
<link rel="apple-touch-icon" href="icon.png" />
<link rel="icon" href="icon.png" />
<link rel="manifest" href="manifest.json" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="shared.css" />
<title>Ripple — Tranquil</title>
<style>
  /* ---- Game-specific: the Ripple board ---- */
  #board {
    background: var(--panel);
    border-radius: 16px;
    padding: 9px;
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(5, 1fr);
    gap: 8px;
    touch-action: none;
    user-select: none;
  }
  .cell {
    position: relative;
    background: var(--cell-empty);
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 160ms ease, box-shadow 200ms ease, transform 90ms ease;
    box-shadow: inset 0 2px 0 rgba(0,0,0,0.25);
  }
  .cell.lit {
    background: var(--accent);
    box-shadow: 0 0 16px rgba(93,214,192,0.55), inset 0 2px 0 rgba(255,255,255,0.25);
  }
  .cell:active { transform: scale(0.96); }
  .cell.ripple { animation: ripple 320ms ease-out; }
  @keyframes ripple {
    0% { transform: scale(1); }
    40% { transform: scale(1.12); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="topbar">
    <div class="brand">
      <a href="index.html" class="icon-btn" aria-label="Back to games">‹</a>
      <span class="title">Ripple</span>
    </div>
    <div class="bar-actions">
      <button class="icon-btn" aria-label="High scores" onclick="LB.open('ripple')">🏆</button>
      <button id="restart" class="icon-btn" aria-label="New game">↻</button>
      <button id="settings-btn" class="icon-btn" aria-label="Settings">⚙</button>
    </div>
  </header>
  <div class="scores">
    <div class="score-box"><div class="score-label">Moves</div><div class="score-val" id="moves">0</div></div>
    <div class="score-box best"><div class="score-label">Best</div><div class="score-val" id="best">–</div></div>
  </div>
  <div class="play-area"><div id="board"></div></div>
</div>

<div id="settings-overlay" class="modal-overlay">
  <div class="modal settings">
    <h2>Ripple</h2>
    <div class="setting-row">
      <span class="label">Sound</span>
      <button id="sound-toggle" class="toggle on">On</button>
    </div>
    <div class="how">
      <p class="how-title">How to play</p>
      <p class="body">Tap a tile to send a ripple — it and its neighbours toggle between rippling and calm. Calm every tile to win.</p>
    </div>
    <button id="settings-share" class="share">Share the game</button>
    <button id="settings-close" class="ghost-btn">Done</button>
    <div class="version-tag" id="app-version"></div>
  </div>
</div>

<div id="overlay" class="modal-overlay">
  <div class="modal">
    <h2>All calm</h2>
    <div class="final" id="final-moves">0</div>
    <div class="final-sub" id="final-sub"></div>
    <button id="play-again">Play again</button>
  </div>
</div>

<script src="leaderboard.js?v=37"></script>
<script>
(function () {
  "use strict";

  const GRID = 5;

  let grid = [];          // GRID x GRID of booleans (true = lit/rippling)
  let moves = 0;
  let won = false;
  let best = (function () {
    const v = localStorage.getItem("tranquil_ripple_best");
    return v === null ? null : Number(v);
  })();

  const boardEl = document.getElementById("board");
  const playArea = document.querySelector(".play-area");
  const movesEl = document.getElementById("moves");
  const bestEl = document.getElementById("best");
  const overlay = document.getElementById("overlay");
  const settingsOverlay = document.getElementById("settings-overlay");
  const soundToggle = document.getElementById("sound-toggle");

  let cellEls = [];

  // ---- Shared sound (collection-wide mute key) ----
  let muted = localStorage.getItem("tranquil_muted") === "1";
  let actx = null;
  function audio() {
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
      catch (e) { actx = null; }
    }
    if (actx && actx.state === "suspended") actx.resume();
  }
  function tone(f, d, t, g) {
    if (muted || !actx) return;
    const o = actx.createOscillator(), gn = actx.createGain();
    o.type = t || "sine";
    o.frequency.value = f;
    gn.gain.setValueAtTime(0.0001, actx.currentTime);
    gn.gain.exponentialRampToValueAtTime(g || 0.1, actx.currentTime + 0.01);
    gn.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + d);
    o.connect(gn); gn.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + d + 0.02);
  }
  function sfxWin() {
    [523, 659, 784].forEach((f, i) => setTimeout(() => tone(f, 0.32, "sine", 0.12), i * 130));
  }

  // ---- Board ----
  const NEIGHBOURS = [[0, 0], [-1, 0], [1, 0], [0, -1], [0, 1]];

  function buildBoard() {
    boardEl.innerHTML = "";
    cellEls = [];
    for (let r = 0; r < GRID; r++) {
      cellEls[r] = [];
      for (let c = 0; c < GRID; c++) {
        const d = document.createElement("div");
        d.className = "cell";
        d.addEventListener("pointerdown", (e) => {
          e.preventDefault();
          audio();
          onTap(r, c);
        });
        boardEl.appendChild(d);
        cellEls[r][c] = d;
      }
    }
  }

  function renderCell(r, c) {
    cellEls[r][c].classList.toggle("lit", grid[r][c]);
  }

  function renderBoard() {
    for (let r = 0; r < GRID; r++)
      for (let c = 0; c < GRID; c++)
        renderCell(r, c);
  }

  // Toggle a cell and its 4 orthogonal neighbours. Returns affected cells.
  function applyToggle(row, col) {
    const affected = [];
    for (const [dr, dc] of NEIGHBOURS) {
      const r = row + dr, c = col + dc;
      if (r >= 0 && r < GRID && c >= 0 && c < GRID) {
        grid[r][c] = !grid[r][c];
        affected.push([r, c]);
      }
    }
    return affected;
  }

  function isAllCalm() {
    for (let r = 0; r < GRID; r++)
      for (let c = 0; c < GRID; c++)
        if (grid[r][c]) return false;
    return true;
  }

  function pulse(r, c) {
    const el = cellEls[r][c];
    el.classList.remove("ripple");
    // force reflow so the animation can replay
    void el.offsetWidth;
    el.classList.add("ripple");
  }

  function onTap(row, col) {
    if (won) return;
    const affected = applyToggle(row, col);
    affected.forEach(([r, c]) => { renderCell(r, c); pulse(r, c); });
    moves++;
    movesEl.textContent = moves;
    tone(330, 0.06, "sine", 0.09);
    if (isAllCalm()) win();
  }

  function win() {
    won = true;
    sfxWin();
    let newBest = false;
    if (best === null || moves < best) {
      best = moves;
      newBest = true;
      localStorage.setItem("tranquil_ripple_best", String(best));
    }
    updateBestLabel();
    setTimeout(() => LB.finish({ game: 'ripple', value: moves, resultTitle: 'All calm', onPlayAgain: newGame }), 420);
  }

  function updateBestLabel() {
    bestEl.textContent = best === null ? "–" : best;
  }

  // Generate a guaranteed-solvable board: start all calm, apply random taps.
  function scramble() {
    grid = Array.from({ length: GRID }, () => Array(GRID).fill(false));
    let attempts = 0;
    do {
      grid = Array.from({ length: GRID }, () => Array(GRID).fill(false));
      const taps = 5 + Math.floor(Math.random() * 6); // 5..10 inclusive
      for (let i = 0; i < taps; i++) {
        const r = Math.floor(Math.random() * GRID);
        const c = Math.floor(Math.random() * GRID);
        applyToggle(r, c);
      }
      attempts++;
    } while (isAllCalm() && attempts < 50);
  }

  function newGame() {
    won = false;
    moves = 0;
    movesEl.textContent = "0";
    scramble();
    renderBoard();
    overlay.classList.remove("show");
    updateBestLabel();
  }

  // ---- Board auto-sizing (largest square that fits) ----
  function sizeBoard() {
    const r = playArea.getBoundingClientRect();
    const s = Math.max(0, Math.floor(Math.min(r.width, r.height)));
    boardEl.style.width = s + "px";
    boardEl.style.height = s + "px";
  }
  window.addEventListener("resize", sizeBoard);
  window.addEventListener("orientationchange", () => setTimeout(sizeBoard, 150));

  // ---- Settings / sound toggle ----
  function updateSoundToggle() {
    soundToggle.textContent = muted ? "Off" : "On";
    soundToggle.classList.toggle("on", !muted);
  }

  soundToggle.addEventListener("click", () => {
    muted = !muted;
    localStorage.setItem("tranquil_muted", muted ? "1" : "0");
    updateSoundToggle();
    if (!muted) { audio(); tone(330, 0.06, "sine", 0.09); }
  });
  document.getElementById("settings-btn").addEventListener("click", () => {
    updateSoundToggle();
    settingsOverlay.classList.add("show");
  });
  document.getElementById("settings-close").addEventListener("click", () => settingsOverlay.classList.remove("show"));
  settingsOverlay.addEventListener("click", (e) => {
    if (e.target === settingsOverlay) settingsOverlay.classList.remove("show");
  });

  async function shareGame() {
    const text = "Ripple — a calm toggle puzzle with no ads. Play it:";
    const url = "https://pete1552.github.io/AGTest/";
    try {
      if (navigator.share) { await navigator.share({ title: "Ripple — Tranquil", text, url }); return; }
    } catch (e) { return; }
    try {
      await navigator.clipboard.writeText(text + " " + url);
      const btn = document.getElementById("settings-share");
      const old = btn.textContent;
      btn.textContent = "Link copied!";
      setTimeout(() => { btn.textContent = old; }, 1500);
    } catch (e) {}
  }
  document.getElementById("settings-share").addEventListener("click", shareGame);

  document.getElementById("restart").addEventListener("click", newGame);
  document.getElementById("play-again").addEventListener("click", newGame);

  // ---- Boot ----
  buildBoard();
  updateSoundToggle();
  updateBestLabel();
  newGame();
  sizeBoard();
  requestAnimationFrame(sizeBoard);
  setTimeout(sizeBoard, 300);
  if (document.fonts && document.fonts.ready) document.fonts.ready.then(sizeBoard);
})();
</script>
</body>
</html>
